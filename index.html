<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>羅茱助手：真・多人同步</title>
    <style>
        /* 基礎暗色風格設定 */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #121212; color: #ffffff; display: flex; justify-content: center; padding: 20px; margin: 0; }
        .container { background: #1e1e1e; padding: 20px; border-radius: 15px; width: 100%; max-width: 400px; box-shadow: 0 8px 30px rgba(0,0,0,0.5); text-align: center; }
        h2 { margin-top: 0; color: #fff; font-size: 1.5rem; }
        
        /* 表單與輸入框 */
        input { width: 80%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #333; background: #2a2a2a; color: #fff; font-size: 1rem; }
        button { padding: 12px 24px; margin: 10px 5px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; font-size: 1rem; transition: 0.2s; }
        .primary-btn { background: #007bff; color: white; width: 85%; }
        .primary-btn:hover { background: #0056b3; }
        .secondary-btn { background: #444; color: white; }

        /* 遊戲上方資訊列 */
        .header-info { display: flex; justify-content: space-between; align-items: center; background: #2a2a2a; padding: 10px; border-radius: 10px; margin-bottom: 15px; }
        .room-code { font-family: monospace; color: #f1c40f; font-size: 1.1rem; }
        
        /* 顏色選單 */
        .color-bar { display: flex; justify-content: space-around; background: #2a2a2a; padding: 10px; border-radius: 10px; margin-bottom: 15px; }
        .color-btn { width: 40px; height: 40px; border-radius: 50%; border: 3px solid transparent; cursor: pointer; transition: 0.3s; }
        .color-btn.selected { border-color: white; transform: scale(1.1); }
        .color-btn.taken { opacity: 0.15; cursor: not-allowed; }

        /* 拼圖表格樣式 */
        table { width: 100%; border-spacing: 5px; }
        .floor-label { width: 40px; font-weight: bold; color: #888; }
        .p-btn { width: 100%; height: 45px; background: #333; border: none; border-radius: 8px; color: #fff; font-weight: bold; cursor: pointer; position: relative; font-size: 1.1rem; }
        .p-btn:hover { background: #444; }
        
        /* 玩家暱稱標籤 */
        .nickname-tag { position: absolute; bottom: 2px; width: 100%; left: 0; text-align: center; font-size: 0.65rem; font-weight: bold; pointer-events: none; }
        
        .hidden { display: none; }
        .share-url { font-size: 0.8rem; color: #888; word-break: break-all; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2>羅茱助手：真・多人同步</h2>

    <div id="startView">
        <button class="primary-btn" onclick="showView('createView')">創建房間</button>
        <button class="primary-btn" onclick="showView('joinView')">加入房間</button>
    </div>

    <div id="createView" class="hidden">
        <input type="password" id="createPwd" placeholder="設定房間密碼 (4碼)" maxlength="4">
        <br>
        <button class="primary-btn" onclick="createRoom()">確認創建</button>
        <button class="secondary-btn" onclick="showView('startView')">返回</button>
    </div>

    <div id="joinView" class="hidden">
        <input type="text" id="joinId" placeholder="輸入房間號碼">
        <input type="password" id="joinPwd" placeholder="輸入密碼">
        <br>
        <button class="primary-btn" onclick="joinRoom()">加入</button>
        <button class="secondary-btn" onclick="showView('startView')">返回</button>
    </div>

    <div id="nicknameView" class="hidden">
        <p id="roomIdDisplay">房間號碼：------</p>
        <input type="text" id="nicknameInput" placeholder="你的暱稱" maxlength="6">
        <br>
        <button class="primary-btn" onclick="setNickname()">開始同步</button>
        <div class="share-url">分享連結：<span id="shareLink"></span></div>
    </div>

    <div id="mainGameView" class="hidden">
        <div class="header-info">
            <div class="room-code">房間：<span id="activeRoomId">------</span></div>
            <button class="secondary-btn" onclick="clearAllPlatforms()" style="margin:0; padding:5px 10px; font-size:0.8rem;">清空平台</button>
        </div>

        <div class="color-bar">
            <div class="color-btn" style="background:#FF7575" data-color="#FF7575" onclick="selectColor('#FF7575')"></div>
            <div class="color-btn" style="background:#FFC78E" data-color="#FFC78E" onclick="selectColor('#FFC78E')"></div>
            <div class="color-btn" style="background:#66B3FF" data-color="#66B3FF" onclick="selectColor('#66B3FF')"></div>
            <div class="color-btn" style="background:#FF79BC" data-color="#FF79BC" onclick="selectColor('#FF79BC')"></div>
            <button onclick="resetMyColor()" style="background:transparent; color:#888; padding:0; font-size:0.7rem;">重選</button>
        </div>

        <table>
            <tbody id="gridBody">
                </tbody>
        </table>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

<script src="app.js"></script>

</body>
</html>
